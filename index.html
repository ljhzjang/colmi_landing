<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Athlete Quest Design Board</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="design-board" aria-labelledby="board-title">
      <h1 id="board-title" class="sr-only">Athlete Quest 사전 등록 랜딩페이지</h1>

      <section class="landing-layout">
        <figure class="landing-board">
          <img src="assets/figma-landing-board.png" alt="Athlete Quest 온보딩과 앱 화면 소개" />
        </figure>

        <section class="waitlist" aria-labelledby="waitlist-title">
          <p class="waitlist__eyebrow">ATHLETE QUEST</p>
          <h2 id="waitlist-title">모험길드 사전 등록</h2>
          <p class="waitlist__description">이메일을 남기면 모험길드 소식을 가장 먼저 알려드릴게요.</p>
          <form class="waitlist__form" id="waitlist-form" novalidate>
            <label class="sr-only" for="waitlist-email">이메일 주소</label>
            <input
              id="waitlist-email"
              name="email"
              type="email"
              inputmode="email"
              autocomplete="email"
              placeholder="이메일 주소를 입력해주세요"
              required
            />
            <button type="submit">사전 등록하기</button>
          </form>
          <p class="waitlist__message" id="waitlist-message" role="status" aria-live="polite"></p>
        </section>
      </section>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
