<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Athlete Quest Design Board</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="design-board" aria-labelledby="board-title">
      <h1 id="board-title" class="sr-only">Athlete Quest 온보딩 디자인 보드</h1>

      <div class="screen-row">
        <figure class="screen screen--standard">
          <img src="assets/screens/01-permissions.png" alt="권한 설정 화면" />
        </figure>

        <figure class="screen screen--standard">
          <img src="assets/screens/02-profile.png" alt="프로필 설정 화면" />
        </figure>

        <figure class="screen screen--wide-complete">
          <span class="complete-copy complete-copy--title" aria-hidden="true">모험을 준비하세요</span>
          <span class="complete-copy complete-copy--message" aria-hidden="true">무사히! 모험을 완수하세요</span>
          <img src="assets/screens/03-complete.png" alt="모험을 준비하세요" />
        </figure>

        <figure class="screen screen--wide-dashboard">
          <img src="assets/screens/04-dashboard.png" alt="홈 대시보드 화면" />
        </figure>

        <figure class="screen screen--wide-start">
          <img src="assets/screens/05-start.png" alt="Athlete Quest 시작 화면" />
        </figure>

        <figure class="screen screen--exact">
          <img src="assets/screens/06-character.png" alt="캐릭터 생성 화면" />
        </figure>

        <figure class="screen screen--standard">
          <img src="assets/screens/07-wearable.png" alt="웨어러블 연결 화면" />
        </figure>
      </div>
    </main>
  </body>
</html>
