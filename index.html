<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Athlete Quest Design Board</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="design-board" aria-labelledby="board-title">
      <h1 id="board-title" class="sr-only">Athlete Quest 온보딩 디자인 보드</h1>

      <div class="screen-row">
        <figure class="screen screen--wide-complete">
          <span class="complete-copy complete-copy--title" aria-hidden="true">모험을 준비하세요</span>
          <span class="complete-copy complete-copy--message" aria-hidden="true">무사히! 모험을 완수하세요</span>
          <img src="assets/screens/03-complete.png" alt="모험을 준비하세요" />
        </figure>

        <figure class="screen screen--wide-dashboard">
          <img src="assets/screens/04-dashboard.png" alt="홈 대시보드 화면" />
        </figure>

        <figure class="screen screen--wide-start">
          <img src="assets/screens/05-start.png" alt="Athlete Quest 시작 화면" />
        </figure>
      </div>

      <section class="waitlist" aria-labelledby="waitlist-title">
        <p class="waitlist__eyebrow">ATHLETE QUEST</p>
        <h2 id="waitlist-title">모험길드 사전 신청</h2>
        <p class="waitlist__description">이메일을 남기면 모험길드 소식을 가장 먼저 알려드릴게요.</p>
        <form class="waitlist__form" id="waitlist-form" novalidate>
          <label class="sr-only" for="waitlist-email">이메일 주소</label>
          <input
            id="waitlist-email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="이메일 주소를 입력해주세요"
            required
          />
          <button type="submit">사전 신청하기</button>
        </form>
        <p class="waitlist__message" id="waitlist-message" role="status" aria-live="polite"></p>
      </section>
    </main>
    <script src="app.js" defer></script>
  </body>
</html>
